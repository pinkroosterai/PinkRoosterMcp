# PinkRooster — unified single-image deployment (default)
#
# Quick start:
#   make setup     # copies .env, registers MCP, starts containers
#
# Or manually:
#   cp .env.example .env
#   docker compose up -d --build
#
# Dashboard:  http://localhost:3000
# MCP server: http://localhost:5200
# API:        http://localhost:5100  (Swagger at /swagger)
#
# For multi-image developer setup, see docker-compose.dev.yml

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: pinkrooster
      POSTGRES_USER: pinkrooster
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinkrooster"]
      interval: 5s
      timeout: 5s
      retries: 5

  pinkrooster:
    build:
      context: .
      dockerfile: docker/unified.Dockerfile
    # For published image, replace 'build' with:
    # image: pinkrooster/pinkroostermcp:latest
    ports:
      - "3000:80"
      - "5100:8080"
      - "5200:8081"
    environment:
      DATABASE_URL: "Host=postgres;Database=pinkrooster;Username=pinkrooster;Password=${POSTGRES_PASSWORD}"
      API_KEY: ${API_KEY:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
